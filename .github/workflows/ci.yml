name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web:
    name: Typecheck, lint, build, smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm typecheck

      - run: pnpm lint

      - run: pnpm build

      - name: Boot dev server and run smoke suite
        run: |
          pnpm dev > /tmp/dev.log 2>&1 &
          for i in $(seq 1 60); do
            if curl -sf -o /dev/null http://127.0.0.1:3000/; then break; fi
            sleep 2
          done
          curl -sf -o /dev/null http://127.0.0.1:3000/ || (cat /tmp/dev.log && exit 1)
          node scripts/smoke-local.mjs

      - name: Print server log on failure
        if: failure()
        run: cat /tmp/dev.log || true

  e2e:
    name: Playwright e2e
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm exec playwright install chromium --with-deps

      - run: pnpm test:e2e

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  verifier:
    name: SymPy verifier tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/verifier
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: services/verifier/requirements*.txt

      - run: pip install -r requirements.txt -r requirements-dev.txt

      - run: python -m pytest tests/ -q
